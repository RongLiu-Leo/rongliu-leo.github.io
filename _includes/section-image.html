{% for item in include.content %}
  <div class="row clearfix layout layout-{{item.layout | default: 'left'}} border-{{item.border | default: 'no'}}">       

      {%- if item.image -%}
      <div class="col-xs-12 col-sm-12 col-md-3 no-print" style="text-align: center;">
        <img src="{{item.image}}" style="width: 250px;"/>
      </div>

      <div class="col-xs-12 col-sm-12 col-md-9 col-print-12 content">
        <h4 id="{{ item.title | slugify }}"><b>{{ item.title }}</b></h4>
        {%- if item.sub_title -%}<p><b>{{ item.sub_title }}</b></p>{%- endif -%}
        {%- if item.caption -%}<p>{{ item.caption }}</p>{%- endif -%}
        {{ item.description | strip | markdownify }}
      </div>
      {%- endif -%}

    
  </div>
{% endfor %}
