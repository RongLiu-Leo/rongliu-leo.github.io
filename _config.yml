      - title: Research Intern
        sub_title: USC Institute for Creative Technologies
        caption: May 2023 - Aug 2023
        layout: top
        description: |
          While interning at USC ICT, I had the privilege of working under the guidance of Dr. Andrew Feng, where my primary focus was on improving the scalability of NeRF when applied to extensive terrain datasets.
          Traditional NeRF models have demonstrated their effectiveness when dealing with relatively small datasets. However, their performance tends to degrade significantly when confronted with complex real-world terrain landscapes, resulting in decreased resolution.
          To address this issue, I integrated an attention mechanism into NerfStudio. This strategy is a ray-level, end-to-end implementation, allowing to filter rays based on their intersection with the attention box. By incorporating the attention box, the grid field became more attuned to specific areas of interest, ultimately leading to an improvement in resolution.
      - title: Research Assistant
        sub_title: Dalian University of Technology
        caption: July 2020 - July 2022
        layout: top
        description: |
          I was fortunate enough to have the opportunity to join the Alpha Lab at DUT and be supervised by Professor Liangtian Wan. In this lab, I was responsible for utilizing objective detection methods in Computer Vision to address problems related to radar signal sorting.
          During these two years, I had the pleasure of collaborating closely with my supervisor and have achieved many accomplishments as a result. We published one paper, obtained two patents, and received an award for an outstanding undergraduate thesis.        
      
      - title: Teaching Assistant
        sub_title: Dalian University of Technology
        caption: September 2021 - June 2022
        layout: top
        description: |
          During my undergraduate studies at Dalian University of Technology, I had the opportunity to serve as a teaching assistant for two courses: 
          **Program Design Basics and C Programming** and **Object-Oriented Method and C++ Program Design**. 
          In this role, I was responsible for holding office hours to assist students with their questions, as well as grading assignments and exams. 
      
      

