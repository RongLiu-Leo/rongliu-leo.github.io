          [Paper](https://www.sciencedirect.com/science/article/pii/S1566253521001834)


  - title: Project # Title for the section
    layout: image # Type of content section (list/text)
    content:
      - title: Store Sales - Time Series Forecasting
        image: images/comparison.png
        description: | # this will include new lines to allow paragraphs
          The fundamental goal of this project is to forecast sales for a company in Ecuador, Corporación Favorita, using time series data, which covers 54 stores with 33 product families, spanning from 2013-01-01 to 2017-08-15 in the train set. 
          To achieve this goal, the project employs Darts to process the data and perform exploratory data analysis. 
          After setting the Exponential Smoothing baseline model and boosting it using ensemble methods, the LightGBM algorithm showed the best performance with a 0.38434 RMSLE. 
          Additionally, the project used model stacking, quadratic fitting, and genetic mutation algorithm to further optimize the result, resulting in a final RMSLE of 0.37894.
          
          [Kaggle Competition](https://www.kaggle.com/competitions/store-sales-time-series-forecasting) |
          [Report](https://drive.google.com/file/d/1qFx3XvNh6RqaNpol3grpwS9sHMt-dqp4/view?usp=share_link)

