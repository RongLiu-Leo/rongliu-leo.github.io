  I'm pursuing a Master of Science in Computer Science at USC and a student researcher at USC Institute for Creative Technologies. My research passion lies in the intersection of Computer Vision and Machine Learning. 

  Currently, I am interested in AI for creation, and I am foucusing on Photorealistic Style Transfer and Neural Radiance Fields (NeRF).

# Prior to studying at USC, I was working with [Liangtian Wan](http://faculty.dlut.edu.cn/wanliangtian/en/index.htm) at DUT Alpha Lab.


