      - title: 'Gaussian Splatting Monitor'
        video: videos/GSS.mp4
        description: | # this will include new lines to allow paragraphs
          We aim to extend 3D Gaussian Splatting, currently limited to RGB rendering and loss, by incorporating differentiable outputs inspired by the versatile Neural Radiance Fields (NeRF), thus enabling advanced research and novel loss functions for improved volumetric analysis.

          [Project Page](https://rongliu-leo.github.io/Gaussian-Splatting-Monitor/) | 
          [Code](https://github.com/RongLiu-Leo/Gaussian-Splatting-Monitor)

      - title: 'GaussianNeRF: High-Fidelity Surface Reconstruction based on Gaussian Constraint'
        image: images/GaussianNeRF.png
        description: | # this will include new lines to allow paragraphs
          We enhanced NeRF's mesh modeling quality and speed by incorporating a Gaussian loss function, resulting in better mesh quality and outperforming Nerfacto in texture and runtime.

          [Report](https://drive.google.com/file/d/1PWURMQx6diQ9lS00MhN-TQsn4VW_PNXA/view?usp=sharing)
      
      - title: 'GPT-ID: GPT Interaction Detector'
        image: images/gptid.png
        description: | # this will include new lines to allow paragraphs
          We propose GPT-ID, a tool built upon DetectGPT, designed to distinguish AI-generated from human-written texts with improved accuracy and novel edit distribution comparison, aiming to ensure responsible use of text-generation technologies.

          [Report](https://drive.google.com/file/d/1N7tjKrtsLJxgBfK7YYpLDIlgeTKgx27g/view?usp=sharing)

      - title: Store Sales - Time Series Forecasting
        image: images/comparison.png
        description: | # this will include new lines to allow paragraphs
          The project aims to forecast sales for Ecuador's Corporación Favorita using time series data, achieving top 5 leaderboard ranking through data analysis, Exponential Smoothing, LightGBM, and Genetic Mutation algorithms.

          [Kaggle Competition](https://www.kaggle.com/competitions/store-sales-time-series-forecasting) |
          [Report](https://drive.google.com/file/d/1faS018QUO05i1PqxFxtH7eI1ePVMCT2z/view?usp=sharing)
          
      - title: 'Undergraduate Thesis: A Radar Signal Sorting and Locating Approach Based on UAV Swarm via Distributed Algorithm'
        image: images/SDSL.jpg
        description: |
          Traditional methods using Pulse Descriptor Word (PDW) for radar signal sorting and locating are limited in accuracy, but our new SDSL framework, utilizing the PP-YOLOE model, improves performance and efficiency, especially for UAV swarms.

          [Paper](https://drive.google.com/file/d/1imDXxVgogoaUwJ4pMvP29f2l-yropwr_/view?usp=sharing) | 
          [Poster](https://drive.google.com/file/d/1D4MpOLaXKGL6iMc2XZJQzcUx04Gmt-DE/view?usp=sharing) | 
          [Patent](https://patentscope.wipo.int/search/en/detail.jsf?docId=CN382200924&_cid=P11-LCPZZ4-10268-1)

